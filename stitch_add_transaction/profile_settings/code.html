<!DOCTYPE html>

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #131313;
      color: #e5e2e1;
      -webkit-font-smoothing: antialiased;
    }
    .inset-list-row:not(:last-child) {
      margin-bottom: 1px;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0e0e0e;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #353534;
      border-radius: 10px;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary/30">
<!-- Main Viewport Container -->
<div class="flex flex-col min-h-screen max-w-2xl mx-auto bg-surface relative">
<!-- TopAppBar - Mapped from Shared Components JSON Strategy -->
<header class="sticky top-0 z-50 bg-[#131313] dark:bg-[#0e0e0e] flex items-center justify-between px-6 py-4 w-full">
<button class="h-12 w-12 flex items-center justify-start text-[#e5e2e1] hover:bg-[#2a2a2a] transition-colors duration-200 rounded-full active:opacity-80 active:scale-95">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Manrope'] text-display-lg leading-tight tracking-tight text-[#e5e2e1] font-bold">Settings</h1>
<!-- Balanced spacing spacer -->
<div class="h-12 w-12"></div>
</header>
<!-- Scrollable Content Shell -->
<main class="flex-1 px-6 pb-24 space-y-10 custom-scrollbar">
<!-- Profile Section -->
<section class="flex flex-col items-center pt-8">
<div class="relative group">
<div class="h-32 w-32 rounded-full p-[2px] bg-gradient-to-tr from-primary to-primary-container">
<div class="h-full w-full rounded-full bg-surface-container-lowest flex items-center justify-center overflow-hidden">
<img alt="Profile picture of Nishanth" class="h-full w-full object-cover" data-alt="Close-up studio portrait of a young man with a friendly expression, soft moody lighting against a dark minimalist background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAwi7KBz2tcfZe1oE8h1F9E2rvhbrikFt1EqMxkVEtZ_1Kwx9lXCEZbt8kM9AQmlaiUUqQ5hrmJeODJlPyW9pJN1A_q3ptvyf9MyP7bpry1eCROZUwWomQ7Krpj1il-niVmj1tbemqy-FfTHIFQCZhSsFhW3ZRKxIEpUIFAPx9G3I2BWgcKwqXp6IzVirbWktiioWh6mSRDYD4qAMzHdAEoFN5IbAG7ZwtTBzuWjk5AJLkJVAhZsBxYDTs4EpQavAubgUpCp5e0UJW_"/>
</div>
</div>
<div class="absolute bottom-1 right-1 bg-primary text-on-primary-container h-8 w-8 rounded-full flex items-center justify-center border-4 border-surface shadow-lg">
<span class="material-symbols-outlined text-[18px]" data-icon="edit">edit</span>
</div>
</div>
<div class="mt-6 text-center">
<h2 class="text-3xl font-headline font-extrabold tracking-tight text-on-surface">Nishanth</h2>
<p class="text-on-surface-variant font-medium mt-1">Personal Finance Companion</p>
</div>
</section>
<!-- Section 1: PREFERENCES -->
<div class="space-y-3">
<h3 class="px-2 text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant opacity-60">PREFERENCES</h3>
<div class="bg-surface-container-low rounded-2xl overflow-hidden">
<!-- Row 1: Theme -->
<div class="flex items-center justify-between px-5 py-4 hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-surface-container text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
</div>
<span class="font-semibold text-on-surface">Theme</span>
</div>
<div class="bg-surface-container-lowest p-1 rounded-xl flex items-center">
<button class="px-4 py-1.5 rounded-lg text-sm font-bold text-on-surface-variant transition-all hover:text-on-surface">Light</button>
<button class="px-4 py-1.5 rounded-lg text-sm font-bold bg-primary text-on-primary transition-all shadow-sm">Dark</button>
</div>
</div>
<!-- Row 2: Currency -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-surface-container text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
</div>
<span class="font-semibold text-on-surface">Currency</span>
</div>
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="text-sm font-medium">USD ($)</span>
<span class="material-symbols-outlined text-xl opacity-40" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
</div>
<!-- Section 2: SECURITY & DATA -->
<div class="space-y-3">
<h3 class="px-2 text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant opacity-60">SECURITY &amp; DATA</h3>
<div class="bg-surface-container-low rounded-2xl overflow-hidden">
<!-- Row 1: Biometric -->
<div class="flex items-center justify-between px-5 py-4 hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-surface-container text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
</div>
<span class="font-semibold text-on-surface">Biometric App Lock</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-12 h-7 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-on-surface after:rounded-full after:h-[19px] after:w-[19px] after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Row 2: Export Data -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-surface-container text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="download">download</span>
</div>
<span class="font-semibold text-on-surface">Export Data (CSV)</span>
</div>
<span class="material-symbols-outlined text-xl text-on-surface-variant opacity-40" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Section 3: ABOUT -->
<div class="space-y-3">
<h3 class="px-2 text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant opacity-60">ABOUT</h3>
<div class="bg-surface-container-low rounded-2xl overflow-hidden">
<!-- Row 1: Privacy Policy -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-surface-container text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="shield">shield</span>
</div>
<span class="font-semibold text-on-surface">Privacy Policy</span>
</div>
<span class="material-symbols-outlined text-xl text-on-surface-variant opacity-40" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Row 2: Terms -->
<button class="w-full flex items-center justify-between px-5 py-4 hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="h-10 w-10 flex items-center justify-center rounded-xl bg-surface-container text-primary-fixed-dim">
<span class="material-symbols-outlined" data-icon="description">description</span>
</div>
<span class="font-semibold text-on-surface">Terms &amp; Conditions</span>
</div>
<span class="material-symbols-outlined text-xl text-on-surface-variant opacity-40" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Delete Data Action (Contextual Premium Feel) -->
<button class="w-full py-4 text-secondary text-sm font-bold tracking-wide hover:bg-secondary-container/10 transition-all rounded-2xl active:scale-[0.98]">
        Delete Account &amp; Data
      </button>
</main>
<!-- Footer - Fixed Padding at Bottom -->
<footer class="pb-10 pt-4 flex flex-col items-center justify-center">
<div class="h-[1px] w-12 bg-surface-container-highest mb-4"></div>
<p class="text-[10px] font-bold uppercase tracking-widest text-on-surface/30">App Version 1.0.0</p>
</footer>
<!-- BottomNavBar - Suppressed for Setting focused task view -->
<!-- As per Hierarchy, this is a Task-Focused sub-page (Settings), suppressing the BottomNavBar -->
</div>
</body></html>
