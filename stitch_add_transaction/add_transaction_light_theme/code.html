<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Transaction | THE SILENT LEDGER</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#6B7280",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#fee2e2",
                        "secondary-fixed-dim": "#fca5a5",
                        "surface-container-low": "#F9FAFB",
                        "on-primary-container": "#ffffff",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "surface-tint": "#10b981",
                        "on-tertiary": "#ffffff",
                        "secondary": "#ef4444",
                        "on-surface": "#1A1C23",
                        "background": "#F4F5F7",
                        "surface-variant": "#E5E7EB",
                        "primary-fixed": "#10b981",
                        "tertiary": "#6366f1",
                        "on-tertiary-container": "#ffffff",
                        "inverse-surface": "#1A1C23",
                        "primary-fixed-dim": "#059669",
                        "on-error": "#ffffff",
                        "on-error-container": "#ffffff",
                        "on-secondary-container": "#ffffff",
                        "outline": "#9CA3AF",
                        "inverse-primary": "#10b981",
                        "on-tertiary-fixed": "#ffffff",
                        "surface-container": "#FFFFFF",
                        "surface-dim": "#F4F5F7",
                        "on-secondary-fixed": "#ffffff",
                        "surface-bright": "#FFFFFF",
                        "secondary-container": "#fee2e2",
                        "on-background": "#1A1C23",
                        "surface-container-lowest": "#F4F5F7",
                        "tertiary-container": "#e0e7ff",
                        "inverse-on-surface": "#F4F5F7",
                        "tertiary-fixed": "#e0e7ff",
                        "on-secondary-fixed-variant": "#ef4444",
                        "primary": "#10b981",
                        "on-primary": "#ffffff",
                        "primary-container": "#10b981",
                        "outline-variant": "#E5E7EB",
                        "on-primary-fixed": "#ffffff",
                        "surface": "#FFFFFF",
                        "error": "#ef4444",
                        "error-container": "#fee2e2",
                        "surface-container-high": "#F3F4F6",
                        "on-tertiary-fixed-variant": "#6366f1",
                        "surface-container-highest": "#E5E7EB",
                        "on-primary-fixed-variant": "#059669"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-end justify-center">
<!-- Backdrop / Ambient Depth -->
<div class="fixed inset-0 bg-slate-200/50 backdrop-blur-md z-0"></div>
<!-- Main Content (Simulation of Bottom Sheet) -->
<div class="relative w-full max-w-2xl bg-surface-container rounded-t-2xl z-10 shadow-[0_-10px_40px_rgba(0,0,0,0.08)] pb-12 overflow-hidden border-t border-outline-variant/30" style="padding-bottom: 100px;">
<!-- Header Section -->
<div class="flex justify-between items-center px-8 py-8">
<div class="w-10"></div> <!-- Spacer -->
<h1 class="text-xl font-bold tracking-[0.1em] text-on-surface">NEW TRANSACTION</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-highest hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- Form Content -->
<div class="px-8 space-y-10 pb-24">
<!-- Amount Input (The Hero) -->
<div class="flex flex-col items-center justify-center space-y-2">
<span class="text-xs font-bold tracking-[0.2em] text-on-surface-variant uppercase">Amount</span>
<input class="w-full bg-transparent border-none text-center text-7xl md:text-8xl font-headline font-extrabold text-primary placeholder:text-surface-variant focus:ring-0 selection:bg-primary/20" placeholder="$0.00" type="text"/>
</div>
<!-- Segmented Toggle -->
<div class="flex p-1.5 bg-surface-container-low rounded-2xl border border-outline-variant">
<button class="flex-1 py-3 px-4 rounded-xl text-sm font-semibold transition-all duration-300 bg-surface-container shadow-sm text-primary ring-1 ring-primary/5">
                    Expense
                </button>
<button class="flex-1 py-3 px-4 rounded-xl text-sm font-semibold transition-all duration-300 text-on-surface-variant hover:text-on-surface">
                    Income
                </button>
</div>
<!-- Bento Grid style inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Category Button -->
<button class="flex items-center justify-between p-5 bg-surface-container-low rounded-2xl hover:bg-surface-container-high transition-all group border border-outline-variant/20">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</div>
<div class="text-left">
<span class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">Category</span>
<span class="text-on-surface font-medium">Select Category</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant/40">chevron_right</span>
</button>
<!-- Date Button -->
<button class="flex items-center justify-between p-5 bg-surface-container-low rounded-2xl hover:bg-surface-container-high transition-all group border border-outline-variant/20">
<div class="flex items-center gap-4">
<div class="w-12 h-12 flex items-center justify-center rounded-xl bg-surface-container-highest text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<div class="text-left">
<span class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase">Date</span>
<span class="text-on-surface font-medium">Today, Oct 24</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant/40">expand_more</span>
</button>
</div>
<!-- Notes Field -->
<div class="space-y-3">
<label class="block text-[10px] font-bold tracking-widest text-on-surface-variant uppercase pl-1">Notes</label>
<div class="relative flex items-center bg-surface-container-low border border-outline-variant/20 rounded-2xl overflow-hidden focus-within:ring-2 ring-primary/20 transition-all">
<div class="pl-5 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="edit_note">edit_note</span>
</div>
<input class="w-full bg-transparent border-none py-5 px-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-0" placeholder="What was this for?" type="text"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-6">
<button class="w-full py-6 rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg tracking-wide shadow-[0_10px_30px_rgba(16,185,129,0.25)] active:scale-[0.98] transition-all duration-200">
                    SAVE TRANSACTION
                </button>
</div>
</div>
<!-- Decorative Indication for "Sheet" -->
<div class="absolute top-3 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Navigation Mirror (Non-functional for context) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-white/90 backdrop-blur-xl rounded-t-[1.5rem] shadow-[0_-4px_40px_rgba(0,0,0,0.05)] border-t border-outline-variant/10 opacity-30 pointer-events-none">
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[10px] font-medium mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-primary bg-primary/5 rounded-xl px-4 py-2">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="text-[10px] font-medium mt-1">Transactions</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2">
<span class="material-symbols-outlined" data-icon="track_changes">track_changes</span>
<span class="text-[10px] font-medium mt-1">Goals</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
<span class="text-[10px] font-medium mt-1">Insights</span>
</div>
</nav>
</body></html>
